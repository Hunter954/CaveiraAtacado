{% extends 'base.html' %}
{% block title %}Entrar | Caveira Atacado{% endblock %}
{% block content %}
<section class="container section narrow"><form method="post" class="card form-card"><h1>Entrar</h1><input type="email" name="email" placeholder="E-mail" required><input type="password" name="password" placeholder="Senha" required><button class="btn btn-full">Entrar</button><p><a href="{{ url_for('auth.forgot_password') }}">Esqueci minha senha</a></p><p>Não tem conta? <a href="{{ url_for('auth.register') }}">Cadastre-se</a></p></form></section>
{% endblock %}

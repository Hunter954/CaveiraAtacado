{% extends 'base.html' %}
{% block content %}<section class="container section"><div class="section-head"><h1>Produtos</h1><a class="btn" href="{{ url_for('admin.new_product') }}">Novo produto</a></div><div class="card table-wrap"><table><tr><th>ID</th><th>Nome</th><th>SKU</th><th>Estoque</th><th>Ações</th></tr>{% for p in products %}<tr><td>{{ p.id }}</td><td>{{ p.name }}</td><td>{{ p.sku }}</td><td>{{ p.stock }}</td><td><a href="{{ url_for('admin.edit_product', product_id=p.id) }}">Editar</a></td></tr>{% endfor %}</table></div></section>{% endblock %}

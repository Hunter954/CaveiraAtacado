{% extends 'base.html' %}
{% block content %}<section class="container section"><div class="section-head"><h1>Pedidos</h1></div><div class="card table-wrap"><table><tr><th>ID</th><th>Cliente</th><th>Status</th><th>Pagamento</th><th>Total</th><th>Ação</th></tr>{% for o in orders %}<tr><td>#{{ o.id }}</td><td>{{ o.user.full_name }}</td><td>{{ o.status }}</td><td>{{ o.payment_status }}</td><td>R$ {{ '%.2f'|format(o.total_amount) }}</td><td><form method="post" action="{{ url_for('admin.order_status', order_id=o.id) }}"><select name="status"><option>aguardando_pagamento</option><option>pago</option><option>em_separacao</option><option>enviado</option><option>entregue</option><option>cancelado</option></select><button>Salvar</button></form></td></tr>{% endfor %}</table></div></section>{% endblock %}

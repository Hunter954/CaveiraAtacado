{% extends 'base.html' %}
{% block content %}<section class="container section narrow"><form method="post" enctype="multipart/form-data" class="card form-card"><h1>{{ 'Editar' if product else 'Novo' }} produto</h1><select name="category_id" required>{% for c in categories %}<option value="{{ c.id }}" {% if product and product.category_id == c.id %}selected{% endif %}>{{ c.name }}</option>{% endfor %}</select><input name="name" placeholder="Nome" value="{{ product.name if product else '' }}" required><input name="sku" placeholder="SKU" value="{{ product.sku if product else '' }}" required><input name="short_description" placeholder="Descrição curta" value="{{ product.short_description if product else '' }}"><textarea name="description" placeholder="Descrição completa">{{ product.description if product else '' }}</textarea><input name="price" type="number" step="0.01" placeholder="Preço" value="{{ product.price if product else '' }}" required><input name="promotional_price" type="number" step="0.01" placeholder="Preço promocional" value="{{ product.promotional_price if product else '' }}"><input name="stock" type="number" placeholder="Estoque" value="{{ product.stock if product else 0 }}"><input name="weight" type="number" step="0.01" placeholder="Peso"><input name="width" type="number" step="0.01" placeholder="Largura"><input name="height" type="number" step="0.01" placeholder="Altura"><input name="length" type="number" step="0.01" placeholder="Comprimento"><input type="file" name="images" multiple><label class="checkbox"><input type="checkbox" name="is_featured" {% if product and product.is_featured %}checked{% endif %}> Destaque</label><label class="checkbox"><input type="checkbox" name="is_new" {% if product and product.is_new %}checked{% endif %}> Novo</label><label class="checkbox"><input type="checkbox" name="is_active" {% if not product or product.is_active %}checked{% endif %}> Ativo</label><button class="btn btn-full">Salvar</button></form></section>{% endblock %}

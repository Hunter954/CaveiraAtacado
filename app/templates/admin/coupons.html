{% extends 'base.html' %}
{% block content %}<section class="container section"><div class="checkout-layout"><form method="post" class="card form-card"><h1>Novo cupom</h1><input name="code" placeholder="Código" required><select name="discount_type"><option value="percent">Percentual</option><option value="fixed">Valor fixo</option></select><input name="discount_value" type="number" step="0.01" placeholder="Desconto" required><label class="checkbox"><input type="checkbox" name="is_active" checked> Ativo</label><button class="btn btn-full">Salvar</button></form><div class="card"><h3>Cupons</h3>{% for c in coupons %}<p>{{ c.code }} · {{ c.discount_type }} · {{ c.discount_value }}</p>{% endfor %}</div></div></section>{% endblock %}
